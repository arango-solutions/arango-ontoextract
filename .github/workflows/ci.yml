name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend
      - name: Ruff check
        run: ruff check backend/
      - name: Mypy
        run: mypy backend/app/ --ignore-missing-imports

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: ESLint
        run: npx eslint .
        working-directory: frontend
      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: frontend

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-fail-under=50
        working-directory: backend
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: backend/coverage.xml

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-backend
    services:
      arangodb:
        image: arangodb:3.12
        ports:
          - 8530:8529
        env:
          ARANGO_NO_AUTH: "1"
        options: >-
          --health-cmd "curl -f http://localhost:8529/_api/version"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 15s
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ARANGO_TEST_HOST: http://localhost:8530
      ARANGO_TEST_USER: root
      ARANGO_TEST_PASSWORD: ""
      REDIS_TEST_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend
      - name: Run integration tests
        run: pytest tests/integration/ -v
        working-directory: backend

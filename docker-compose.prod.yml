services:
  # ---------- Reverse proxy / TLS ----------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - aoe-prod-network

  # ---------- Backend (FastAPI) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: production
      REDIS_URL: redis://redis:6379/0
      ARANGO_HOST: http://arangodb:8529
    depends_on:
      arangodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aoe-prod-network

  # ---------- Frontend (Next.js) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - aoe-prod-network

  # ---------- ArangoDB ----------
  arangodb:
    image: arangodb:3.12
    restart: unless-stopped
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_PASSWORD:-changeme}
    volumes:
      - arangodb_prod_data:/var/lib/arangodb3
      - arangodb_prod_apps:/var/lib/arangodb3-apps
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8529/_api/version"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aoe-prod-network

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aoe-prod-network

  # ---------- MCP Server (optional) ----------
  mcp-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: ["mcp"]
    env_file: .env
    environment:
      ARANGO_HOST: http://arangodb:8529
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "app.mcp.server"]
    depends_on:
      arangodb:
        condition: service_healthy
    networks:
      - aoe-prod-network

volumes:
  caddy_data:
  caddy_config:
  arangodb_prod_data:
  arangodb_prod_apps:
  redis_prod_data:

networks:
  aoe-prod-network:
    driver: bridge

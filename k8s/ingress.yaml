apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aoe-ingress
  labels:
    app: aoe
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - aoe.example.com
      secretName: aoe-tls
  rules:
    - host: aoe.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: aoe-backend
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: aoe-backend
                port:
                  number: 8000
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: aoe-backend
                port:
                  number: 8000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: aoe-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aoe-frontend
                port:
                  number: 3000

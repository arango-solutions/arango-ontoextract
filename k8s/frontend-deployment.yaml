apiVersion: apps/v1
kind: Deployment
metadata:
  name: aoe-frontend
  labels:
    app: aoe
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aoe
      component: frontend
  template:
    metadata:
      labels:
        app: aoe
        component: frontend
    spec:
      containers:
        - name: frontend
          image: aoe-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: /api/v1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: aoe-frontend
  labels:
    app: aoe
    component: frontend
spec:
  selector:
    app: aoe
    component: frontend
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  type: ClusterIP

# pre-commit framework config — drives BOTH pre-commit and pre-push hooks.
#
# Setup once per clone:    make install-git-hooks   (or `make setup`)
# Bypass (emergency only): git commit  --no-verify
#                          git push    --no-verify
# Manual full run:         make pre-commit-run-all
#
# Tier A (pre-commit, fast): formatters + linters on STAGED files only.
# Tier B (pre-push, heavier): unit tests + mypy + conditional Docker smoke.
# Tier C (server-side, real enforcement): GitHub branch protection — see
#   scripts/setup-branch-protection.sh and docs/git-hygiene.md.

default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]

default_language_version:
  python: python3

repos:
  # -----------------------------------------------------------------------
  # Hygiene (whitespace, EOF, large files, syntax). Cheap, run on every commit.
  # -----------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-yaml
        # Helm/CI tooling sometimes embeds custom YAML tags; allow them.
        args: [--unsafe]
      - id: check-toml
      - id: check-json
        # Next.js/TS configs use JSONC (json with comments); skip those.
        exclude: ^(frontend/tsconfig.*\.json|frontend/\.vscode/.*\.json)$

  # -----------------------------------------------------------------------
  # Python: ruff (lint + format) on staged files. Picks up backend/pyproject.toml
  # automatically by walking up from each file.
  # -----------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      # ruff-check is the new name for the lint hook (ruff-pre-commit v0.13+);
      # the bare `ruff` id is a deprecated alias.
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(backend/|benchmarks/).*\.py$
      - id: ruff-format
        files: ^(backend/|benchmarks/).*\.py$

  # -----------------------------------------------------------------------
  # Frontend (TS/JS): ESLint --fix on staged files only.
  # Wrapper strips the `frontend/` prefix and runs eslint from frontend/.
  # -----------------------------------------------------------------------
  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend, --fix)
        entry: scripts/githooks/eslint-staged.sh
        language: system
        types_or: [ts, tsx, javascript, jsx]
        files: ^frontend/

      # ---------------------------------------------------------------------
      # BYOC parity: keep root requirements.txt in lock-step with
      # backend/pyproject.toml [project].dependencies. The hook fires whenever
      # pyproject.toml is staged and regenerates requirements.txt. If that
      # changes the file, pre-commit fails with the standard "files were
      # modified by this hook" message — the user re-stages and re-commits
      # (same UX as ruff-format). We deliberately do NOT `git add` from the
      # hook because pre-commit's unstaged-stash mechanism conflicts with
      # in-hook staging when requirements.txt has unstaged changes.
      # CI still runs `sync-requirements.sh --check` as a backstop in case
      # the hook is bypassed with --no-verify.
      # ---------------------------------------------------------------------
      - id: sync-requirements
        name: Sync requirements.txt from backend/pyproject.toml (BYOC parity)
        # Prepend backend/.venv to PATH so the script's `python3` resolves to
        # the project's 3.13 venv (system python3 on macOS is 3.9 → no tomllib).
        entry: bash -c 'PATH="$PWD/backend/.venv/bin:$PATH" bash scripts/sync-requirements.sh'
        language: system
        pass_filenames: false
        files: ^backend/pyproject\.toml$

      # ---------------------------------------------------------------------
      # Version parity: frontend/package.json "version" must match the backend
      # single-source __version__ (backend/app/__init__.py). Fires when either
      # file is staged, so a release commit that bumps only one side fails
      # here — the drift that left the frontend stuck at 1.0.0 through v1.1.0.
      # Check-only (no auto-fix): rewriting package.json risks clobbering
      # formatting, and the fix is a one-line human edit. Because
      # `make pre-commit-run-all` runs Tier A, this also gates release-to-org.
      # CI runs the same script as a backstop against --no-verify.
      # ---------------------------------------------------------------------
      - id: version-parity
        name: Frontend/backend version parity
        entry: bash scripts/check-version-parity.sh
        language: system
        pass_filenames: false
        files: ^(backend/app/__init__\.py|frontend/package\.json)$

  # =======================================================================
  # Tier B — pre-push only. Runs once per `git push`, not per commit.
  # =======================================================================
  - repo: local
    hooks:
      # Refuses pushes of `main` (or other configured "release" branches)
      # to a protected remote (e.g. arango-solutions/) unless HEAD is at a
      # release tag matching `vX.Y.Z`. Feature branches and release tags
      # are always allowed; pushes to non-protected remotes (your personal
      # fork) are silently allowed too. Configure via env vars:
      # UPSTREAM_PROTECTED_URL_PATTERN, UPSTREAM_PROTECTED_BRANCH,
      # UPSTREAM_RELEASE_TAG_PATTERN. See docs/git-hygiene.md "Solo-dev
      # workflow" and the script header for details.
      - id: protect-upstream-push
        name: Refuse non-release pushes to protected upstream
        entry: scripts/githooks/protect-upstream-push.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
        # Must run before the heavy hooks below; if we're going to refuse
        # the push, refuse it BEFORE running jest/pytest/mypy/smoke.
        verbose: false

      - id: jest-unit
        name: Jest unit tests (pre-push)
        entry: bash -c 'cd frontend && npm test -- --ci --coverage=false'
        language: system
        pass_filenames: false
        stages: [pre-push]
        # Only triggers when frontend code is being pushed.
        files: ^frontend/.*\.(ts|tsx|js|jsx|mjs|cjs|json)$

      # tsc --noEmit catches type errors that ESLint cannot — generic constraint
      # violations, missing properties on union narrowings, declaration-merging
      # bugs, etc. Caught locally before push so we do not burn a CI cycle on
      # something the IDE already knew about. Triggers only when TS source
      # changes; pure .js / .json edits skip it.
      - id: tsc-noemit
        name: TypeScript type-check (pre-push)
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        pass_filenames: false
        stages: [pre-push]
        files: ^frontend/.*\.(ts|tsx)$

      - id: pytest-unit
        name: Pytest unit tests (pre-push)
        entry: bash -c 'cd backend && .venv/bin/pytest tests/unit/ -q'
        language: system
        pass_filenames: false
        stages: [pre-push]
        files: ^(backend/|benchmarks/).*\.py$

      - id: mypy
        name: mypy backend/app (pre-push)
        entry: bash -c 'cd backend && .venv/bin/mypy app/ --ignore-missing-imports'
        language: system
        pass_filenames: false
        stages: [pre-push]
        files: ^backend/.*\.py$

      - id: smoke-test
        name: Docker unified-image smoke (pre-push, only when build inputs change)
        entry: bash scripts/smoke-test.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
        # Trigger only when files that affect the unified Docker image change —
        # avoids spending ~2 min on every push for code-only changes (CI still
        # runs the full smoke job for every PR via .github/workflows/ci.yml).
        files: |
          (?x)^(
            Dockerfile|
            nginx.*\.conf|
            backend/entrypoint|
            backend/pyproject\.toml|
            backend/uv\.lock|
            backend/app/main\.py|
            frontend/next\.config\..+|
            frontend/package(-lock)?\.json|
            scripts/smoke-test\.sh
          )$
